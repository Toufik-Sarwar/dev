<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional News Card Maker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #f0f2f5; padding: 20px; }
        .main-container { max-width: 1100px; margin: auto; background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        
        /* এডিটর সেকশন */
        .editor-box { background: #f9f9f9; padding: 20px; border-radius: 12px; border: 1px solid #ddd; }
        
        /* ফটোকার্ড ডিজাইন - একদম ছবির মতো কম্প্যাক্ট */
        #photocard {
            width: 600px;
            background: #fff;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            border: 1px solid #eee;
        }

        .img-container { width: 100%; height: 400px; position: relative; overflow: hidden; }
        #bg-image { width: 100%; height: 100%; object-fit: cover; }
        .logo-watermark { position: absolute; top: 15px; left: 15px; background: rgba(255,255,255,0.9); padding: 5px; border-radius: 4px; border: 1px solid #ddd; }

        .text-container { 
            padding: 15px 25px; /* এখানে প্যাডিং কমিয়ে গ্যাপ কমানো হয়েছে */
            display: flex; 
            flex-direction: column;
        }

        .badge-news {
            background: #d32f2f;
            color: white;
            padding: 2px 10px;
            font-size: 14px;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 8px; /* ব্যাজ এবং শিরোনামের গ্যাপ কমানো হয়েছে */
        }

        .headline {
            font-size: 32px;
            font-weight: 700;
            line-height: 1.2; /* লাইন গ্যাপ কমানো হয়েছে */
            color: #000;
            margin: 0; /* এক্সট্রা মার্জিন রিমুভ করা হয়েছে */
            padding-bottom: 10px; /* নিচের তারিখের সাথে দূরত্ব কমানো হয়েছে */
        }

        .footer-line {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #f0f0f0;
            padding-top: 8px;
            margin-top: 5px;
        }

        .source-txt { color: #d32f2f; font-weight: 800; font-size: 18px; text-transform: lowercase; }
        .date-txt { color: #666; font-size: 14px; }

        .download-btn { background: #d32f2f; color: #fff; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container main-container">
    <div class="row">
        <div class="col-md-5">
            <div class="editor-box">
                <h5 class="mb-3 text-center">কার্ড এডিটর</h5>
                <label class="small fw-bold">লোগো</label>
                <input type="file" class="form-control mb-2" id="logoInp" accept="image/*">
                
                <label class="small fw-bold">খবরের ছবি</label>
                <input type="file" class="form-control mb-2" id="imgInp" accept="image/*">
                
                <label class="small fw-bold">ক্যাটাগরি</label>
                <input type="text" class="form-control mb-2" id="catInp" value="ব্রেকিং নিউজ">
                
                <label class="small fw-bold">শিরোনাম</label>
                <textarea class="form-control mb-2" id="titleInp" rows="2" placeholder="শিরোনাম লিখুন..."></textarea>
                
                <label class="small fw-bold">সোর্স/নাম</label>
                <input type="text" class="form-control mb-2" id="srcInp" placeholder="jfjjfhj">
                
                <button class="download-btn" onclick="takeScreenshot()">ডাউনলোড করুন</button>
            </div>
        </div>

        <div class="col-md-7 d-flex align-items-center">
            <div id="photocard">
                <div class="img-container">
                    <div class="logo-watermark">
                        <img id="logo-pre" src="https://via.placeholder.com/60/fff/000?text=LOGO" style="height: 30px;">
                    </div>
                    <img id="bg-image" src="https://via.placeholder.com/600x400?text=Upload+Image">
                </div>
                <div class="text-container">
                    <div>
                        <span class="badge-news" id="outCat">ব্রেকিং নিউজ</span>
                        <h1 class="headline" id="outTitle">একবারেই অসম্ভব একটা ওয়েবসাইট তৈরি করতে পারবে আমার কাছ</h1>
                    </div>
                    <div class="footer-line">
                        <span class="source-txt" id="outSrc">jfjjfhj</span>
                        <span class="date-txt" id="outDate">১২ জানুয়ারি, ২০২৬</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Live Text Update
    const bind = (idIn, idOut) => {
        document.getElementById(idIn).addEventListener('input', (e) => {
            document.getElementById(idOut).innerText = e.target.value;
        });
    };
    bind('titleInp', 'outTitle');
    bind('catInp', 'outCat');
    bind('srcInp', 'outSrc');

    // Image Preview
    const preview = (idIn, idOut) => {
        document.getElementById(idIn).addEventListener('change', function() {
            if (this.files && this.files[0]) {
                const reader = new FileReader();
                reader.onload = e => document.getElementById(idOut).src = e.target.result;
                reader.readAsDataURL(this.files[0]);
            }
        });
    };
    preview('imgInp', 'bg-image');
    preview('logoInp', 'logo-pre');

    // Screenshot
    function takeScreenshot() {
        html2canvas(document.querySelector("#photocard"), { scale: 3 }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'NewsCard.png';
            link.href = canvas.toDataURL();
            link.click();
        });
    }
</script>

</body>
</html>
